name: Sync tool submodule

on:
  repository_dispatch:
    types: [tool-updated]
  workflow_dispatch:
    inputs:
      tool_key:
        description: "Tool-Schluessel (1049, 1067, 1052)"
        required: true
      tool_sha:
        description: "Commit-SHA des Tool-Repos"
        required: true
      source_repo:
        description: "Quell-Repository (owner/repo)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      INPUT_TOOL_KEY: ${{ inputs.tool_key }}
      INPUT_TOOL_SHA: ${{ inputs.tool_sha }}
      INPUT_SOURCE_REPO: ${{ inputs.source_repo }}
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve payload
        id: payload
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          if [ "${event_name}" = "repository_dispatch" ]; then
            tool_key="$(jq -r '.client_payload.tool_key // empty' "${GITHUB_EVENT_PATH}")"
            tool_sha="$(jq -r '.client_payload.tool_sha // empty' "${GITHUB_EVENT_PATH}")"
            source_repo="$(jq -r '.client_payload.source_repo // empty' "${GITHUB_EVENT_PATH}")"
          else
            tool_key="${INPUT_TOOL_KEY}"
            tool_sha="${INPUT_TOOL_SHA}"
            source_repo="${INPUT_SOURCE_REPO}"
          fi

          if [ -z "${tool_key}" ] || [ -z "${tool_sha}" ]; then
            echo "tool_key oder tool_sha fehlen."
            exit 1
          fi

          case "${tool_key}" in
            1049)
              submodule_path="tools/1049-pdf-extraktor-lbv"
              tool_name="1049 PDF-Extraktor"
              ;;
            1067)
              submodule_path="tools/1067-relelisten-extraktor"
              tool_name="1067 RELElisten-Extraktor"
              ;;
            1052)
              submodule_path="tools/1052-buchungsimporteur-sap-lbv"
              tool_name="1052 Buchungsimporteur"
              ;;
            *)
              echo "Unbekannter tool_key: ${tool_key}"
              exit 1
              ;;
          esac

          echo "tool_key=${tool_key}" >> "$GITHUB_OUTPUT"
          echo "tool_sha=${tool_sha}" >> "$GITHUB_OUTPUT"
          echo "source_repo=${source_repo}" >> "$GITHUB_OUTPUT"
          echo "submodule_path=${submodule_path}" >> "$GITHUB_OUTPUT"
          echo "tool_name=${tool_name}" >> "$GITHUB_OUTPUT"

      - name: Update submodule commit
        id: update
        run: |
          set -euo pipefail

          submodule_path="${{ steps.payload.outputs.submodule_path }}"
          tool_sha="${{ steps.payload.outputs.tool_sha }}"

          if [ ! -d "${submodule_path}" ]; then
            echo "Submodulpfad nicht gefunden: ${submodule_path}"
            exit 1
          fi

          git -C "${submodule_path}" fetch origin "${tool_sha}"
          git -C "${submodule_path}" checkout "${tool_sha}"

          new_sha="$(git -C "${submodule_path}" rev-parse HEAD)"
          short_sha="$(git -C "${submodule_path}" rev-parse --short HEAD)"
          echo "new_sha=${new_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          submodule_path="${{ steps.payload.outputs.submodule_path }}"
          if git diff --quiet -- "${submodule_path}"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and commit
        if: steps.changes.outputs.has_changes == 'true'
        id: commit
        run: |
          set -euo pipefail

          tool_key="${{ steps.payload.outputs.tool_key }}"
          submodule_path="${{ steps.payload.outputs.submodule_path }}"
          short_sha="${{ steps.update.outputs.short_sha }}"
          branch_name="sync/${tool_key}-${short_sha}"

          git config user.name "rele-sync-bot"
          git config user.email "rele-sync-bot@users.noreply.github.com"

          git checkout -b "${branch_name}"
          git add "${submodule_path}"
          git commit -m "chore: update ${tool_key} submodule to ${short_sha}"
          git push --set-upstream origin "${branch_name}"

          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        run: |
          set -euo pipefail

          branch_name="${{ steps.commit.outputs.branch_name }}"
          existing_pr_url="$(gh pr list --head "${branch_name}" --state open --json url --jq '.[0].url')"

          if [ -n "${existing_pr_url}" ]; then
            pr_url="${existing_pr_url}"
          else
            pr_url="$(gh pr create \
              --base master \
              --head "${branch_name}" \
              --title "chore: sync ${{ steps.payload.outputs.tool_key }} tool update" \
              --body "Automatische Tool-Synchronisierung: ${{ steps.payload.outputs.tool_name }} -> ${{ steps.update.outputs.new_sha }}")"
          fi

          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "${{ steps.pr.outputs.pr_url }}"

      - name: No update required
        if: steps.changes.outputs.has_changes != 'true'
        run: |
          echo "Submodulstand ist bereits aktuell. Keine PR notwendig."
